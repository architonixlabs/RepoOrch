<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoOrch — LinkedIn Post</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    line-height: 1.7;
    padding: 40px 20px;
  }
  .post {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .section {
    background: white;
    border-radius: 12px;
    padding: 28px 32px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .label {
    display: inline-block;
    font-size: 0.72em;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #94a3b8;
    margin-bottom: 14px;
  }
  .prose { line-height: 1.9; font-size: 1.02em; color: #1e293b; }
  .prose p { margin-bottom: 1.1em; }
  .prose p:last-child { margin-bottom: 0; }
  .prose strong { color: #0f172a; }
  .prose em { color: #475569; }
  .diagram-title {
    font-size: 0.88em;
    font-weight: 700;
    color: #475569;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e2e8f0;
  }
  /* Two-column grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  /* Tile */
  .tile { border-radius: 8px; padding: 14px; line-height: 1.6; }
  .tile-title { font-weight: 700; margin-bottom: 6px; font-size: 0.9em; }
  .tile-body { font-size: 0.87em; }
  /* Flow box */
  .flow { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .flow-box {
    width: 82%;
    border-radius: 8px;
    padding: 11px 20px;
    font-weight: 600;
    text-align: center;
    color: white;
    font-size: 0.9em;
  }
  .flow-box span { font-weight: 400; font-size: 0.87em; display: block; margin-top: 2px; opacity: 0.92; }
  .flow-arrow { color: #94a3b8; font-size: 1.2em; }
  .flow-note {
    width: 82%;
    background: #f1f5f9;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    font-size: 0.86em;
    color: #374151;
    line-height: 1.6;
  }
  .flow-agents { display: flex; gap: 10px; justify-content: center; width: 100%; flex-wrap: wrap; }
  .flow-agent {
    background: #10b981;
    color: white;
    border-radius: 8px;
    padding: 10px 14px;
    text-align: center;
    flex: 1;
    min-width: 130px;
    font-size: 0.87em;
  }
  .flow-agent strong { display: block; margin-bottom: 4px; }
  .flow-agent span { font-size: 0.82em; opacity: 0.9; }
  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-row { display: flex; align-items: stretch; gap: 0; }
  .tl-time {
    width: 72px;
    text-align: right;
    padding-right: 14px;
    font-size: 0.8em;
    color: #94a3b8;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .tl-line {
    width: 3px;
    background: #e2e8f0;
    position: relative;
    flex-shrink: 0;
  }
  .tl-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .tl-content {
    flex: 1;
    padding: 10px 14px;
    margin: 4px 0;
    border-radius: 8px;
    font-size: 0.88em;
    line-height: 1.6;
  }
  /* Layers */
  .layer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .layer-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    flex-shrink: 0;
    font-size: 0.9em;
  }
  .layer-content { flex: 1; border-radius: 8px; padding: 10px 14px; }
  .layer-content strong { display: block; margin-bottom: 2px; font-size: 0.9em; }
  .layer-content p { font-size: 0.86em; color: #374151; margin: 0; }
  /* Before/After */
  .ba-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .ba-col { border-radius: 8px; padding: 16px; border: 2px solid; }
  .ba-col-title { font-weight: 700; margin-bottom: 14px; font-size: 0.92em; }
  .ba-item { padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid; line-height: 1.7; font-size: 0.88em; }
  .ba-item:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  /* Chat bubbles */
  .chat { display: flex; flex-direction: column; gap: 10px; }
  .bubble { border-radius: 8px; padding: 12px 14px; line-height: 1.6; font-size: 0.88em; }
  .bubble-label { font-weight: 700; margin-bottom: 4px; font-size: 0.88em; }
  .bubble code { background: rgba(0,0,0,0.08); border-radius: 3px; padding: 1px 4px; font-size: 0.92em; }
  .chat-note {
    background: #f1f5f9;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    font-size: 0.86em;
    color: #374151;
    line-height: 1.6;
  }
  /* Terminal */
  .terminal {
    background: #1e1e2e;
    color: #cdd6f4;
    border-radius: 8px;
    padding: 18px;
    font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    font-size: 0.85em;
    line-height: 1.8;
  }
  /* Suggestions */
  .suggestion {
    border-left: 4px solid;
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    line-height: 1.6;
    font-size: 0.92em;
    margin-bottom: 10px;
  }
  .suggestion:last-child { margin-bottom: 0; }
  .suggestion strong { display: block; margin-bottom: 2px; }
  /* CTA */
  .cta { font-size: 1.02em; line-height: 1.9; }
  .cta .link { color: #4f46e5; font-weight: 600; }
  .cta .hashtags { color: #94a3b8; font-size: 0.9em; margin-top: 14px; }
  @media (max-width: 560px) {
    .grid-2, .ba-grid { grid-template-columns: 1fr; }
    .flow-box { width: 100%; }
    .flow-note { width: 100%; }
  }
</style>
</head>
<body>
<div class="post">
  <!-- sections go here -->
</div>
</body>
</html>
